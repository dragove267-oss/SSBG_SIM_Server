<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSBG SIM 어드민 대시보드</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Malgun Gothic', sans-serif; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .currency-badge { min-width: 100px; display: inline-block; text-align: right; }
        .table-responsive { max-height: 600px; overflow-y: auto; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">SSBG SIM Admin Dashboard</span>
            <div class="d-flex">
                <button class="btn btn-outline-light btn-sm me-2" onclick="loadUsers()">🔄 새로고침</button>
                <span id="server-status" class="badge bg-success pt-2">Server Online</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card p-3">
                    <h5 class="card-title">🚀 유저 관리 및 모니터링</h5>
                    <div class="table-responsive mt-3">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>User ID</th>
                                    <th>Academic</th>
                                    <th>Extra</th>
                                    <th>Idle</th>
                                    <th>EXP</th>
                                    <th>Last Updated</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="user-list">
                                <!-- 데이터 로딩 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- 유저 수정 섹션 -->
            <div class="col-md-6">
                <div class="card p-4 mb-4">
                    <h5 class="card-title mb-3">🛠 유저 데이터 수정 <span id="selected-user-badge" class="badge bg-primary d-none">선택됨</span></h5>
                    <div class="mb-3">
                        <label class="form-label text-muted small">User ID (목록에서 선택하세요)</label>
                        <input type="text" id="target-user-id" class="form-control bg-light" readonly placeholder="위 목록에서 유저를 클릭하세요">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">재화 종류</label>
                            <select id="currency-type" class="form-select">
                                <option value="academicCurrency">Academic</option>
                                <option value="extraCurrency">Extra</option>
                                <option value="idleCurrency">Idle</option>
                                <option value="exp">EXP</option>
                            </select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">금액/수량</label>
                            <input type="number" id="modify-amount" class="form-control" value="100">
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary flex-fill" onclick="modifyData('gain')">➕ 지급하기</button>
                        <button class="btn btn-danger flex-fill" onclick="modifyData('spend')">➖ 차감하기</button>
                    </div>
                </div>
            </div>

            <!-- 시스템 제어 섹션 -->
            <div class="col-md-6">
                <div class="card p-4">
                    <h5 class="card-title mb-3">⚙ 시스템 제어 (Webhook)</h5>
                    <p class="text-muted small">학교 서버의 데이터를 강제로 갱신하고 게임 서버로 푸시 이벤트를 보냅니다.</p>
                    <div class="mb-3">
                        <label class="form-label text-muted small">Target User ID (Webhook)</label>
                        <input type="text" id="webhook-user-id" class="form-control bg-light" readonly placeholder="선택된 유저 없음">
                    </div>
                    <button class="btn btn-warning w-100" onclick="triggerWebhook()">🔔 학교 데이터 강제 업데이트 트리거</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
